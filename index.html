<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Definitions</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom Keyframe Animation for Form Jiggling */
        @keyframes jiggle {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .animate-jiggle {
            animation: jiggle 0.4s ease-in-out;
        }
    </style>
</head>
<body class="bg-white text-slate-900 min-h-screen flex flex-col justify-between selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Minimalist Header Bar -->
    <header class="bg-white border-b border-slate-100 py-5 px-6 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto grid grid-cols-3 items-center gap-2">
            <!-- Lighter Grey Title (Left) -->
            <h1 class="text-sm sm:text-xl font-bold text-slate-400 tracking-tight text-left truncate">Electricity Definitions</h1>
            
            <!-- Centered Header Metrics Panel (Center) -->
            <div id="header-metrics" class="hidden flex justify-center items-center gap-2 sm:gap-4 text-[10px] sm:text-xs font-bold text-slate-500 uppercase tracking-wider">
                <span id="header-progress">Question 1/12</span>
                <span class="text-slate-300">|</span>
                <span id="header-level">Level 1/1</span>
            </div>

            <!-- Minimalist Red Upward Timer, no background, no border (Right) -->
            <div class="text-right">
                <span id="timer-display" class="hidden code-font text-xs sm:text-sm font-extrabold text-red-600">00:00</span>
            </div>
        </div>
    </header>

    <!-- Main Floating Flat Workspace (No outer grey card backgrounds or shadows) -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 md:p-12">
        <div class="w-full max-w-2xl flex flex-col transition-all duration-300">

            <!-- 0. Loading Screen -->
            <div id="loading-screen" class="flex flex-col items-center justify-center text-center py-12 w-full max-w-sm mx-auto">
                <div class="w-12 h-12 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <p class="text-slate-500 font-semibold animate-pulse">Fetching science questions...</p>
            </div>

            <!-- 0.5 Error Screen -->
            <div id="error-screen" class="hidden flex flex-col items-center justify-center text-center py-12 w-full max-w-md mx-auto">
                <div class="text-rose-500 text-5xl mb-4">⚠️</div>
                <h3 class="text-lg font-bold text-slate-800 mb-2">Failed to load science deck</h3>
                <p id="error-details" class="text-slate-500 text-sm mb-6"></p>
                <button onclick="retryLoading()" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-xl transition shadow-sm">
                    Try Again
                </button>
            </div>

            <!-- 1. Start Screen (Flat White-on-White, Name Entry Only) -->
            <div id="start-screen" class="hidden flex flex-col items-center text-center py-12 w-full max-w-sm mx-auto">
                <div id="name-container" class="w-full mb-6">
                    <label for="student-name-input" class="block text-slate-800 text-lg font-bold mb-3">Enter your (last) name:</label>
                    <input type="text" id="student-name-input" autocomplete="off" oninput="toggleStartButtonState()"
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-semibold focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-base text-center"
                           placeholder="Name" />
                </div>
                
                <!-- Wrapper to detect clicks on the inactive state -->
                <div onclick="handleDisabledStartClick(event)" class="w-full">
                    <button id="start-quiz-btn" onclick="startQuiz()" disabled
                            class="w-full py-3.5 bg-slate-200 text-slate-400 font-bold rounded-xl shadow-sm transition-all cursor-not-allowed pointer-events-none">
                        Start Quiz
                    </button>
                </div>
            </div>

            <!-- 2. Active Quiz Screen -->
            <div id="quiz-screen" class="hidden flex flex-col gap-6">
                
                <!-- Active Question Cloze Space -->
                <div class="py-6 text-xl md:text-2xl font-semibold leading-relaxed text-slate-800 border-b border-slate-100" id="cloze-sentence">
                    <!-- Populated dynamically -->
                </div>

                <!-- Interactive Work Block (E.g. Word Bank for Level 2) -->
                <div id="interaction-block" class="flex flex-col gap-4">
                    <!-- Loaded dynamically per level -->
                </div>

                <!-- Bottom Continuation Actions -->
                <div class="flex justify-end pt-4">
                    <button id="action-btn" onclick="submitAnswer()" class="w-full sm:w-auto px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-xl transition shadow-sm">
                        Submit Answer
                    </button>
                </div>
            </div>

            <!-- 3. Result Screen -->
            <div id="result-screen" class="hidden flex flex-col items-center text-center py-12">
                <div id="result-badge" class="text-5xl mb-6">🏆</div>
                <h2 id="result-message" class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight leading-snug">
                    <!-- congratulations [name]! you completed the quiz in [time] -->
                </h2>
                <button onclick="restartQuiz()" class="mt-8 text-indigo-600 hover:text-indigo-800 font-bold text-sm transition focus:outline-none underline decoration-2 decoration-indigo-600/30 hover:decoration-indigo-800">
                    Restart Quiz
                </button>
            </div>

        </div>
    </main>

    <!-- Simple Flat Footer -->
    <footer class="border-t border-slate-100 py-6 text-center text-xs text-slate-400 font-medium">
        <div class="max-w-3xl mx-auto px-6 flex justify-center items-center">
            <span>Press <kbd class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-slate-500 font-mono text-[10px]">Space</kbd> or <kbd class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded text-slate-500 font-mono text-[10px]">Enter</kbd> to submit/continue.</span>
        </div>
    </footer>

    <!-- Audio Player (Synthesized Web Audio API Sound Generator) -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function resumeAudio() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTickSound() {
            try {
                resumeAudio();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.02);

                gainNode.gain.setValueAtTime(0.012, audioCtx.currentTime); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.02);
            } catch (e) {}
        }

        function playSound(success) {
            try {
                resumeAudio();
                const now = audioCtx.currentTime;

                if (success) {
                    const osc1 = audioCtx.createOscillator();
                    const gain1 = audioCtx.createGain();
                    osc1.connect(gain1);
                    gain1.connect(audioCtx.destination);
                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(523.25, now); 
                    osc1.frequency.setValueAtTime(659.25, now + 0.07); 
                    osc1.frequency.setValueAtTime(783.99, now + 0.14); 
                    
                    gain1.gain.setValueAtTime(0.04, now);
                    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                    osc1.start();
                    osc1.stop(now + 0.4);

                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1046.50, now + 0.14); 
                    
                    gain2.gain.setValueAtTime(0.015, now + 0.14);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    osc2.start();
                    osc2.stop(now + 0.5);
                } else {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(145, now);
                    osc.frequency.setValueAtTime(115, now + 0.08);

                    gainNode.gain.setValueAtTime(0.05, now);
                    gainNode.gain.setValueAtTime(0.05, now + 0.08);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);

                    osc.start();
                    osc.stop(now + 0.3);
                }
            } catch (e) {}
        }
    </script>

    <!-- State Management & Definitions -->
    <script>
        let state = {
            started: false,
            ended: false,
            timeElapsed: 0, 
            timerInterval: null,
            levels: [1, 2, 3], // Populated dynamically from CSV line 1
            currentLevelIndex: 0, 
            currentLevel: 1, 
            questions: [], // Loaded from Google Sheets CSV
            deck: [], 
            deckIndex: 0,
            hasEvaluated: false,
            originalDeckSize: 0,
            correctCount: 0,
            userName: "",
            activeInputIndex: 0 // Tracks selected input box for Word Bank
        };

        window.onload = function() {
            fetchQuestions();
        };

        // Standard robust manual CSV parsing
        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i+1];
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push("");
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') {
                        i++;
                    }
                    lines.push(row);
                    row = [""];
                } else {
                    row[row.length - 1] += char;
                }
            }
            if (row.length > 1 || row[0] !== "") {
                lines.push(row);
            }
            return lines;
        }

        async function fetchQuestions() {
            const url = "https://docs.google.com/spreadsheets/d/1RIhik9aUcISa7gpR0ER4krOPl4hyAgVJXKsWu3j3WPg/export?format=csv&gid=1796652581&single=true";
            let delay = 1000;
            const maxRetries = 5;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error("HTTP Status " + response.status);
                    const text = await response.text();
                    
                    parseQuestionsFromCSV(text);
                    
                    document.getElementById('loading-screen').classList.add('hidden');
                    resetToInitialState();
                    return;
                } catch (error) {
                    if (i === maxRetries - 1) {
                        document.getElementById('loading-screen').classList.add('hidden');
                        const errScreen = document.getElementById('error-screen');
                        errScreen.classList.remove('hidden');
                        document.getElementById('error-details').innerText = error.message;
                        return;
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        function retryLoading() {
            document.getElementById('error-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            fetchQuestions();
        }

        function parseQuestionsFromCSV(csvText) {
            const parsedLines = parseCSV(csvText);
            if (parsedLines.length === 0) return;

            // Row 1 contains active levels (e.g. "1,2,3" or "1")
            const firstRowVal = parsedLines[0][0] || "";
            const parsedLevels = firstRowVal.split(',').map(s => parseInt(s.trim(), 10)).filter(n => !isNaN(n));
            state.levels = parsedLevels.length > 0 ? parsedLevels : [3];

            const loadedQuestions = [];
            for (let i = 1; i < parsedLines.length; i++) {
                const line = parsedLines[i][0];
                if (!line || line.trim() === "") continue;

                // Match content within brackets: e.g., [electron; proton, neutron]
                const clozes = [];
                let template = line;
                const regex = /\[([^\]]+)\]/g;
                let match;
                const matches = [];

                while ((match = regex.exec(line)) !== null) {
                    matches.push({
                        full: match[0],
                        content: match[1],
                        index: match.index
                    });
                }

                // Replace each bracket match from back to front to preserve absolute index offsets
                for (let j = matches.length - 1; j >= 0; j--) {
                    const m = matches[j];
                    const parts = m.content.split(';');
                    const correctWord = parts[0].trim();
                    const distractors = parts[1] ? parts[1].split(',').map(s => s.trim()).filter(s => s !== "") : [];

                    clozes.unshift({
                        word: correctWord,
                        distractors: distractors
                    });

                    template = template.substring(0, m.index) + `__CLOZE_${j}__` + template.substring(m.index + m.full.length);
                }

                // Clean string mapping definition (for backward logic where needed)
                let definition = template;
                clozes.forEach((cl, idx) => {
                    definition = definition.replace(`__CLOZE_${idx}__`, cl.word);
                });

                loadedQuestions.push({
                    template: template,
                    definition: definition,
                    clozes: clozes
                });
            }
            state.questions = loadedQuestions;
        }

        function resetToInitialState() {
            state.started = false;
            state.ended = false;
            if (state.timerInterval) clearInterval(state.timerInterval);
            state.timeElapsed = 0;

            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('header-metrics').classList.add('hidden');
            document.getElementById('timer-display').classList.add('hidden');

            const nameInput = document.getElementById('student-name-input');
            if (nameInput) {
                nameInput.value = "";
                nameInput.focus();
            }
            toggleStartButtonState();
        }

        function normalizeText(str) {
            return str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "").replace(/\s+/g, " ").trim();
        }

        function shuffleDeck(array) {
            let copy = [...array];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function toggleStartButtonState() {
            const inputVal = document.getElementById('student-name-input').value.trim();
            const startBtn = document.getElementById('start-quiz-btn');
            if (inputVal.length > 0) {
                startBtn.disabled = false;
                startBtn.className = "w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold rounded-xl shadow-sm transition-all transform hover:-translate-y-0.5 cursor-pointer";
            } else {
                startBtn.disabled = true;
                startBtn.className = "w-full py-3.5 bg-slate-200 text-slate-400 font-bold rounded-xl shadow-sm transition-all cursor-not-allowed pointer-events-none";
            }
        }

        function triggerFormJiggle() {
            const container = document.getElementById('name-container');
            const input = document.getElementById('student-name-input');
            if (container) {
                container.classList.remove('animate-jiggle');
                void container.offsetWidth; // Force layout reflow
                container.classList.add('animate-jiggle');
                playSound(false);
            }
            if (input) {
                input.focus();
            }
        }

        function handleDisabledStartClick(event) {
            const inputVal = document.getElementById('student-name-input').value.trim();
            if (inputVal.length === 0) {
                triggerFormJiggle();
            }
        }

        function initLevel() {
            state.deck = shuffleDeck(state.questions);
            state.deckIndex = 0;
            state.correctCount = 0;
            state.originalDeckSize = state.deck.length;
            state.activeInputIndex = 0;
        }

        function startQuiz() {
            const nameField = document.getElementById('student-name-input');
            const nameVal = nameField ? nameField.value.trim() : "";
            
            if (nameVal.length === 0) {
                triggerFormJiggle();
                return; 
            }
            state.userName = nameVal;

            state.started = true;
            state.ended = false;
            state.timeElapsed = 0;
            state.currentLevelIndex = 0;
            state.currentLevel = state.levels[0];
            initLevel();
            state.hasEvaluated = false;

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('header-metrics').classList.remove('hidden');
            document.getElementById('timer-display').classList.remove('hidden');

            startTimer();
            renderQuestion();
        }

        function startTimer() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            updateTimerDisplay();
            state.timerInterval = setInterval(() => {
                state.timeElapsed++;
                updateTimerDisplay();
                playTickSound(); 
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').innerText = formatTime(state.timeElapsed);
        }

        function formatTime(totalSeconds) {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function renderQuestion() {
            const currentItem = state.deck[state.deckIndex];
            const clozeBlock = document.getElementById('cloze-sentence');
            const interactionBlock = document.getElementById('interaction-block');
            const actionBtn = document.getElementById('action-btn');

            state.hasEvaluated = false;
            state.activeInputIndex = 0;
            actionBtn.innerText = "Submit Answer";

            const displayQuestionNum = Math.min(state.correctCount + 1, state.originalDeckSize);
            document.getElementById('header-progress').innerText = `Question ${displayQuestionNum}/${state.originalDeckSize}`;
            document.getElementById('header-level').innerText = `Level ${state.currentLevelIndex + 1}/${state.levels.length}`;

            let runningMarkup = currentItem.template;

            if (state.currentLevel === 1) {
                // Dropdown layout
                currentItem.clozes.forEach((cl, idx) => {
                    const options = shuffleDeck([cl.word, ...cl.distractors]);
                    let optionsHTML = `<option value="" disabled selected>...</option>`;
                    options.forEach(opt => {
                        optionsHTML += `<option value="${escapeHTML(opt)}">${escapeHTML(opt)}</option>`;
                    });

                    const selectEl = `
                        <select id="cloze-multi-input-${idx}" onchange="resumeAudio()"
                            class="inline-block border-b-2 border-indigo-400 focus:border-indigo-600 bg-indigo-50/50 px-2 py-0.5 text-center text-indigo-700 font-extrabold focus:outline-none rounded transition-all text-sm outline-none cursor-pointer mx-1">
                            ${optionsHTML}
                        </select>
                    `;
                    runningMarkup = runningMarkup.replace(`__CLOZE_${idx}__`, selectEl);
                });
                clozeBlock.innerHTML = runningMarkup;
                interactionBlock.innerHTML = "";

                setTimeout(() => {
                    const firstSelect = document.getElementById('cloze-multi-input-0');
                    if (firstSelect) firstSelect.focus();
                }, 50);

            } else if (state.currentLevel === 2) {
                // Free text input + Word Bank
                currentItem.clozes.forEach((cl, idx) => {
                    const inputWidth = Math.max(90, cl.word.length * 9 + 25);
                    const inputEl = `
                        <input type="text" id="cloze-multi-input-${idx}" autocomplete="off" onfocus="state.activeInputIndex = ${idx}"
                            class="inline-block border-b-2 border-indigo-400 focus:border-indigo-600 bg-indigo-50/20 px-2 py-0.5 text-center text-indigo-700 font-extrabold focus:outline-none rounded transition-all text-sm outline-none mx-1" 
                            style="width: ${inputWidth}px" placeholder="......" />
                    `;
                    runningMarkup = runningMarkup.replace(`__CLOZE_${idx}__`, inputEl);
                });
                clozeBlock.innerHTML = runningMarkup;

                // Render dynamic Word Bank
                const allWords = shuffleDeck(currentItem.clozes.map(cl => cl.word));
                let bankHTML = `
                    <div class="mt-4 p-4 bg-slate-50 border border-slate-100 rounded-2xl flex flex-col items-center gap-3">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Word Bank</span>
                        <div class="flex flex-wrap gap-2 justify-center">
                `;
                allWords.forEach(word => {
                    bankHTML += `
                        <button onclick="fillActiveInput('${escapeJS(word)}')"
                            class="px-3.5 py-2 bg-white border border-slate-200 hover:border-indigo-400 text-indigo-600 hover:text-indigo-800 font-bold rounded-xl text-sm shadow-sm transition transform active:scale-95">
                            ${escapeHTML(word)}
                        </button>
                    `;
                });
                bankHTML += `</div></div>`;
                interactionBlock.innerHTML = bankHTML;

                setTimeout(() => {
                    const firstInput = document.getElementById('cloze-multi-input-0');
                    if (firstInput) firstInput.focus();
                }, 50);

            } else {
                // Free text input (No guides)
                currentItem.clozes.forEach((cl, idx) => {
                    const inputWidth = Math.max(90, cl.word.length * 9 + 25);
                    const inputEl = `
                        <input type="text" id="cloze-multi-input-${idx}" autocomplete="off"
                            class="inline-block border-b-2 border-indigo-400 focus:border-indigo-600 bg-indigo-50/20 px-2 py-0.5 text-center text-indigo-700 font-extrabold focus:outline-none rounded transition-all text-sm outline-none mx-1" 
                            style="width: ${inputWidth}px" placeholder="......" />
                    `;
                    runningMarkup = runningMarkup.replace(`__CLOZE_${idx}__`, inputEl);
                });
                clozeBlock.innerHTML = runningMarkup;
                interactionBlock.innerHTML = "";

                setTimeout(() => {
                    const firstInput = document.getElementById('cloze-multi-input-0');
                    if (firstInput) firstInput.focus();
                }, 50);
            }
        }

        function fillActiveInput(word) {
            playTickSound();
            const input = document.getElementById(`cloze-multi-input-${state.activeInputIndex}`);
            if (input) {
                input.value = word;
                
                // Find and advance focus to the next empty input field
                const totalClozes = state.deck[state.deckIndex].clozes.length;
                for (let i = 0; i < totalClozes; i++) {
                    const nextIdx = (state.activeInputIndex + 1 + i) % totalClozes;
                    const nextInput = document.getElementById(`cloze-multi-input-${nextIdx}`);
                    if (nextInput && !nextInput.value.trim()) {
                        nextInput.focus();
                        state.activeInputIndex = nextIdx;
                        return;
                    }
                }
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function escapeJS(str) {
            return str.replace(/'/g, "\\'");
        }

        function submitAnswer() {
            if (state.ended) return;

            const actionBtn = document.getElementById('action-btn');
            const clozeBlock = document.getElementById('cloze-sentence');
            const interactionBlock = document.getElementById('interaction-block');

            if (state.hasEvaluated) {
                state.hasEvaluated = false;
                state.deckIndex++;

                if (state.deckIndex >= state.deck.length) {
                    transitionLevel();
                } else {
                    renderQuestion();
                }
                return;
            }

            const currentItem = state.deck[state.deckIndex];
            let isCorrect = true;
            const userAnswers = [];
            
            currentItem.clozes.forEach((cl, idx) => {
                const inputEl = document.getElementById(`cloze-multi-input-${idx}`);
                const val = inputEl ? inputEl.value.trim() : "";
                const clCorrect = normalizeText(val) === normalizeText(cl.word);
                userAnswers.push({ val: val, isCorrect: clCorrect, word: cl.word });
                if (!clCorrect) {
                    isCorrect = false;
                }
            });

            // Replace placeholder markup with colored correct / incorrect templates
            let runningMarkup = currentItem.template;
            currentItem.clozes.forEach((cl, idx) => {
                const ans = userAnswers[idx];
                let feedbackHTML;
                if (ans.isCorrect) {
                    feedbackHTML = `<span class="text-emerald-600 font-extrabold border-b-2 border-emerald-500 px-1.5 py-0.5 bg-emerald-50 rounded text-base inline-block mx-1">${escapeHTML(ans.val)}</span>`;
                } else {
                    const displayVal = ans.val || "[blank]";
                    feedbackHTML = `
                        <span class="inline-flex flex-wrap items-center gap-1.5 mx-1">
                            <span class="line-through text-rose-500 font-semibold border-b-2 border-rose-300 px-1.5 py-0.5 bg-rose-50/50 rounded text-base">${escapeHTML(displayVal)}</span> 
                            <span class="text-emerald-600 font-extrabold border-b-2 border-emerald-500 px-1.5 py-0.5 bg-emerald-100/50 rounded text-base">${escapeHTML(ans.word)}</span>
                        </span>
                    `;
                }
                runningMarkup = runningMarkup.replace(`__CLOZE_${idx}__`, feedbackHTML);
            });

            clozeBlock.innerHTML = runningMarkup;
            interactionBlock.innerHTML = ""; // Clear Word Bank upon evaluation

            if (isCorrect) {
                state.correctCount++;
            } else {
                state.deck.push(currentItem);
            }

            playSound(isCorrect);
            state.hasEvaluated = true;
            actionBtn.innerText = "Continue (Space / Enter)";
            actionBtn.focus();
        }

        function transitionLevel() {
            state.currentLevelIndex++;
            if (state.currentLevelIndex < state.levels.length) {
                state.currentLevel = state.levels[state.currentLevelIndex];
                initLevel();
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            clearInterval(state.timerInterval);
            state.ended = true;

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('header-metrics').classList.add('hidden');
            document.getElementById('timer-display').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const message = document.getElementById('result-message');
            message.innerHTML = `congratulations <span class="text-indigo-600">${escapeHTML(state.userName)}</span>! you completed the <em>electricity definitions</em> challenge in <span class="text-slate-950 font-bold">${formatTime(state.timeElapsed)}</span>`;
        }

        function restartQuiz() {
            resetToInitialState();
        }

        window.onkeydown = function(e) {
            if (!state.started) {
                const nameInput = document.getElementById('student-name-input');
                const nameVal = nameInput ? nameInput.value.trim() : "";
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (nameVal.length === 0) {
                        triggerFormJiggle();
                    } else {
                        startQuiz();
                    }
                }
                return;
            }
            if (state.ended) return;

            const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : "";
            if (activeTag === 'input' || activeTag === 'select') {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitAnswer();
                }
                return;
            }

            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                submitAnswer();
            }
        };
    </script>
</body>
</html>
